<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสารสนเทศบุคลากร - โครงการ วมว. มน.</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #f37021; --secondary-color: #0056b3; --bg-color: #f4f7f6; }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; }
        .navbar { background: white; padding: 15px 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .navbar h1 { margin: 0; font-size: 1.5em; color: var(--secondary-color); }
        .tab-buttons button { padding: 10px 20px; font-family: 'Sarabun'; font-size: 1em; border: none; background: transparent; cursor: pointer; border-bottom: 3px solid transparent; font-weight: 600; color: #666; }
        .tab-buttons button.active { color: var(--secondary-color); border-bottom: 3px solid var(--secondary-color); }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .tab-content { display: none; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .tab-content.active { display: block; }
        .person-card { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        .info { flex-grow: 1; }
        .name { font-size: 1.2em; font-weight: bold; }
        .role { color: #666; font-size: 0.9em; }
        .status-badge { padding: 6px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9em; text-align: center; display: inline-block; min-width: 80px; }
        .status-in { background: #d4edda; color: #155724; }
        .status-out { background: #f8d7da; color: #721c24; }
        .status-meeting { background: #fff3cd; color: #856404; }
        .status-leave { background: #e2e3e5; color: #383d41; }
        .status-acting { background: #f3e5f5; color: #4a148c; border: 1px solid #7b1fa2; }
        .action-area { display: flex; gap: 10px; align-items: center; }
        select { padding: 8px; border-radius: 6px; border: 1px solid #ccc; font-family: 'Sarabun'; }
        .btn-update { padding: 8px 15px; background: var(--secondary-color); color: white; border: none; border-radius: 6px; cursor: pointer; font-family: 'Sarabun'; }
        .auto-text { color: #999; font-size: 0.85em; font-style: italic; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day-name { text-align: center; font-weight: 600; padding: 10px; background: var(--secondary-color); color: white; border-radius: 6px; }
        .day-cell { min-height: 100px; background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; padding: 8px; }
        .event { font-size: 0.75em; padding: 4px; border-radius: 4px; margin-top: 4px; border-left: 3px solid; }
        .event-absent { background: #ffebee; color: #c62828; border-color: #d32f2f; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>ระบบสารสนเทศ โครงการ วมว. มน.</h1>
        <div class="tab-buttons">
            <button class="active" onclick="switchTab('statusTab')" id="btn-statusTab">กระดานสถานะวันนี้</button>
            <button onclick="switchTab('calendarTab')" id="btn-calendarTab">ปฏิทินปฏิบัติงาน</button>
        </div>
    </div>

    <div class="container">
        <div id="statusTab" class="tab-content active">
            <h2 style="color: var(--secondary-color);">สถานะผู้บริหารและเจ้าหน้าที่</h2>
            <div id="statusBoard">กำลังโหลดข้อมูล...</div>
        </div>
        <div id="calendarTab" class="tab-content">
            <h2 id="monthYearDisplay">ปฏิทินปฏิบัติงาน</h2>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>
    </div>

    <script>
        const GAS_BASE_URL = 'https://script.google.com/macros/s/AKfycbxBzXwL0LzTFGJaqcjAHfZEjeesHaMUWNmUHdY4iET_QJD0dGlyqU50ygr9dxRy5gIACw/exec';
        const API_STATUS = `${GAS_BASE_URL}?sheet=Status`;
        const API_CALENDAR = `${GAS_BASE_URL}?sheet=Schedule`;

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-buttons button').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById(`btn-${tabId}`).classList.add('active');
            if(tabId === 'statusTab') loadStatusData();
            if(tabId === 'calendarTab') loadCalendarData();
        }

        async function loadStatusData() {
            const board = document.getElementById('statusBoard');
            try {
                const [sRes, cRes] = await Promise.all([fetch(API_STATUS), fetch(API_CALENDAR)]);
                const statusData = await sRes.json();
                const calendarData = await cRes.json();
                
                const todayStr = new Date().toISOString().split('T')[0];
                const isWeekend = [0, 6].includes(new Date().getDay());
                const todaysEvents = calendarData.filter(e => e.date === todayStr);
                
                const isDirAbsent = todaysEvents.some(e => e.name.includes('ฑิราณี') && e.type === 'absent') || 
                                   ['ไม่อยู่', 'ลา'].includes(statusData.find(p => p.Name.includes('ฑิราณี'))?.Status);

                board.innerHTML = '';
                statusData.forEach(p => {
                    let curStatus = p.Status || 'อยู่';
                    let dispStatus = curStatus;
                    let sClass = 'status-in';
                    let isAuto = false;

                    if(isWeekend) { dispStatus = 'วันหยุด'; sClass = 'status-leave'; isAuto = true; }
                    else {
                        const ev = todaysEvents.find(e => e.name.includes(p.Name));
                        if(ev) { dispStatus = ev.status; sClass = ev.type === 'absent' ? 'status-out' : 'status-meeting'; isAuto = true; }
                        else {
                            if(curStatus === 'ไม่อยู่') sClass = 'status-out';
                            if(curStatus === 'ประชุม') sClass = 'status-meeting';
                            if(curStatus === 'ลา') sClass = 'status-leave';
                        }
                        if(p.Name.includes('ฑิราณี') && !isDirAbsent && curStatus === 'อยู่') dispStatus = 'อยู่ (ลงนามได้)';
                        if(p.Name.includes('ทนงศักดิ์') && isDirAbsent && !ev) { dispStatus = 'รักษาราชการแทน ผอ.'; sClass = 'status-acting'; isAuto = true; }
                    }

                    board.innerHTML += `
                        <div class="person-card">
                            <div class="info"><div class="name">${p.Name}</div><div class="role">${p.Role}</div></div>
                            <div><span class="status-badge ${sClass}">${dispStatus}</span></div>
                            <div class="action-area">
                                ${isAuto ? '<span class="auto-text">อัตโนมัติ</span>' : 
                                `<select id="sel-${p.ID}"><option value="อยู่">อยู่</option><option value="ไม่อยู่">ไม่อยู่</option></select>
                                 <button class="btn-update" onclick="updateStatus('${p.ID}')">บันทึก</button>`}
                            </div>
                        </div>`;
                });
            } catch (e) { board.innerHTML = "Error: " + e.message; }
        }

        async function updateStatus(id) {
            const stat = document.getElementById(`sel-${id}`).value;
            await fetch(GAS_BASE_URL, { method: 'POST', body: JSON.stringify({id, status: stat}) });
            loadStatusData();
        }

        let calendarData = [];
        async function loadCalendarData() {
            const res = await fetch(API_CALENDAR);
            calendarData = await res.json();
            renderCalendar();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            ["อา", "จ", "อ", "พ", "พฤ", "ศ", "ส"].forEach(d => grid.innerHTML += `<div class="day-name">${d}</div>`);
            const daysInMonth = new Date(2026, 2+1, 0).getDate(); // มีนาคม 2026
            for(let d=1; d<=daysInMonth; d++) {
                grid.innerHTML += `<div class="day-cell"><strong>${d}</strong></div>`;
            }
        }

        loadStatusData();
    </script>
</body>
</html>
