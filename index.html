<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบปฏิบัติงานของผู้บริหาร ของโครงการ วมว.มน.</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #f37021;
            --secondary-color: #0056b3;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; color: var(--text-color); }
        
        /* Navbar & Tabs */
        .navbar { background-color: white; padding: 15px 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .navbar h1 { margin: 0; font-size: 1.5em; color: var(--secondary-color); }
        .tab-buttons button { padding: 10px 20px; font-family: 'Sarabun', sans-serif; font-size: 1em; border: none; background: transparent; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.3s; font-weight: 600; color: #666; }
        .tab-buttons button:hover { color: var(--secondary-color); }
        .tab-buttons button.active { color: var(--secondary-color); border-bottom: 3px solid var(--secondary-color); }

        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .
