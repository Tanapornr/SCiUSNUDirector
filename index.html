<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Management System - SCiUS NU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --biz-navy: #0f172a;
            --biz-blue: #0284c7;
            --biz-bg: #f8fafc;
        }
        body { 
            font-family: 'Sarabun', -apple-system, sans-serif; 
            background-color: var(--biz-bg); 
            color: #1e293b;
            overflow-x: hidden;
        }
        .biz-header {
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 4px solid #f59e0b;
        }
        .tab-btn {
            transition: all 0.3s ease;
            color: #94a3b8;
            font-weight: 800;
        }
        .tab-active {
            color: #ffffff !important;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 12px;
        }
        .executive-card {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.07);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .table-fixed {
            table-layout: fixed;
            width: 100%;
        }
        .name-cell {
            padding-left: 1.25rem !important;
            text-align: left;
            width: 38%; /* ปรับขนาดให้พอดีกับนามสกุล */
        }
        .date-cell {
            width: 12.4%;
            padding: 12px 2px !important;
        }
        .today-banner {
            background-color: var(--biz-navy) !important;
            color: white !important;
        }
        .today-column-highlight {
            background-color: rgba(2, 132, 199, 0.04) !important;
        }
        .btn-interact {
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        .btn-interact:active {
            transform: scale(0.85);
        }
        /* สถานะที่ชัดเจนที่สุด */
        .status-vivid-tick {
            color: #059669; /* Emerald-600 */
            font-size: 1.5rem;
            opacity: 1 !important; /* บังคับความชัดเจน 100% */
            filter: drop-shadow(0 1px 1px rgba(0,0,0,0.05));
        }
        .status-vivid-cross {
            color: #dc2626; /* Red-600 */
            font-size: 1.5rem;
            opacity: 1 !important;
        }
    </style>
</head>
<body class="pb-12">

    <header class="biz-header sticky top-0 z-50 shadow-2xl">
        <div class="max-w-5xl mx-auto px-4 flex justify-between items-center h-20">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-lg">
                    <span class="text-slate-900 font-black text-xl">S</span>
                </div>
                <div>
                    <h1 class="text-white font-extrabold text-lg leading-tight tracking-tight">ระบบปฏิบัติงานผู้บริหาร</h1>
                    <p class="text-[10px] text-orange-400 font-bold uppercase tracking-widest">โครงการ วมว.-มน.</p>
                </div>
            </div>
            <div class="flex p-1 gap-1">
                <button id="btn-home" onclick="showTab('home')" class="tab-btn px-4 py-2 text-xs tab-active">สถานะ</button>
                <button id="btn-calendar" onclick="showTab('calendar')" class="tab-btn px-4 py-2 text-xs">ปฏิทิน</button>
                <button id="btn-admin" onclick="showTab('admin')" class="tab-btn px-4 py-2 text-xs">จัดการ</button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-3 mt-8">
        
        <div id="tab-home" class="tab-content transition-all duration-300">
            <div class="flex items-end justify-between mb-5 px-1">
                <div>
                    <h2 class="text-2xl font-extrabold text-slate-900 tracking-tighter">คณะผู้บริหารโครงการ</h2>
                    <p class="text-[11px] font-bold text-slate-500 uppercase tracking-widest mt-1 underline decoration-orange-500 decoration-2">Weekly Executive Plan</p>
                </div>
                <button onclick="loadAllData()" class="bg-white border border-slate-200 text-slate-900 font-bold text-[10px] px-4 py-2 rounded-xl shadow-sm hover:bg-slate-50 transition-all">🔄 REFRESH</button>
            </div>
            
            <div class="executive-card overflow-hidden">
                <table class="table-fixed text-center">
                    <thead>
                        <tr id="tableHeader" class="bg-slate-100 text-[10px] font-black text-slate-500 uppercase border-b border-slate-200"></tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
            <div class="mt-8 flex flex-wrap justify-center gap-6">
                <div class="flex items-center gap-2 text-[10px] font-extrabold text-slate-500"><span class="text-emerald-600 text-lg">✅</span> อยู่ปฏิบัติงาน (ปกติ)</div>
                <div class="flex items-center gap-2 text-[10px] font-extrabold text-slate-500"><span class="text-red-600 text-lg">❌</span> ลา / ไปราชการ (คลิกเพื่อดู)</div>
                <div class="flex items-center gap-2 text-[10px] font-extrabold text-slate-500"><span class="text-lg">👑</span> รักษาราชการแทน ผอ.</div>
            </div>
        </div>

        <div id="tab-calendar" class="tab-content hidden"><div class="executive-card p-6">
            <div class="flex justify-between items-center mb-8"><button onclick="changeMonth(-1)" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center font-black">‹</button>
            <h2 id="calMonthYear" class="text-xl font-extrabold text-slate-900"></h2><button onclick="changeMonth(1)" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center font-black">›</button></div>
            <div class="grid grid-cols-7 gap-2" id="calendarGrid"></div></div></div>

        <div id="tab-admin" class="tab-content hidden"><div class="max-w-md mx-auto executive-card p-8">
            <h2 class="text-2xl font-extrabold text-slate-900 mb-6">บันทึกข้อมูล</h2><div class="space-y-4">
            <select id="adminNameSelect" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold text-sm shadow-inner"></select>
            <div class="grid grid-cols-2 gap-4"><input type="date" id="startDate" class="p-4 bg-slate-50 rounded-2xl border-none font-bold text-xs shadow-inner"><input type="date" id="endDate" class="p-4 bg-slate-50 rounded-2xl border-none font-bold text-xs shadow-inner"></div>
            <input type="text" id="reason" placeholder="เหตุผล (เช่น ไปราชการ กทม.)" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold text-sm shadow-inner">
            <button id="submitBtn" onclick="submitAbsence()" class="w-full bg-slate-900 text-white font-extrabold py-5 rounded-2xl shadow-xl active:scale-95 transition-all text-sm uppercase">Submit Record</button></div></div></div>
    </main>

    <div id="loader" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex items-center justify-center hidden">
        <div class="bg-white p-8 rounded-3xl shadow-2xl flex flex-col items-center">
            <div class="w-10 h-10 border-4 border-orange-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Processing</p>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzxT63E3SeiMZoWeK_KbVD1Ci8DHp6L_VzRFsE9tcF3cvB1d2VsoVr2hPj9tq3Azt4dgg/exec';
        let rawStatus = []; let rawSchedule = []; let viewDate = new Date(2026, 2, 30);

        async function loadAllData() {
            document.getElementById('loader').classList.remove('hidden');
            try {
                const [res1, res2] = await Promise.all([
                    fetch(`${API_URL}?sheet=Status`, { redirect: 'follow' }),
                    fetch(`${API_URL}?sheet=Schedule`, { redirect: 'follow' })
                ]);
                rawStatus = await res1.json(); rawSchedule = await res2.json();
                renderHome(); renderCalendar(); populateAdminSelect();
            } catch (e) { Swal.fire('Error', 'Connection Failed', 'error'); } 
            finally { document.getElementById('loader').classList.add('hidden'); }
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById(`tab-${id}`).classList.remove('hidden');
            document.getElementById(`btn-${id}`).classList.add('tab-active');
        }

        function normalizeDate(d) {
            if(!d) return null;
            const date = new Date(d); date.setHours(0,0,0,0);
            return date.getTime();
        }

        function showDetail(name, reason, start, end) {
            const startDate = new Date(start).toLocaleDateString('th-TH', { day:'numeric', month:'long' });
            const endDate = new Date(end).toLocaleDateString('th-TH', { day:'numeric', month:'long' });
            Swal.fire({
                title: `<span class="text-xs font-black text-slate-400 uppercase tracking-widest">Absence Record</span><br><span class="text-xl font-extrabold text-slate-900">${name}</span>`,
                html: `<div class="mt-4 p-4 bg-slate-50 rounded-2xl border border-slate-100"><p class="text-lg font-bold text-red-600 mb-1">"${reason}"</p><p class="text-[10px] font-bold text-slate-400">ช่วงวันที่: ${startDate} - ${endDate}</p></div>`,
                confirmButtonText: 'รับทราบ', confirmButtonColor: '#0f172a'
            });
        }

        function renderHome() {
            const header = document.getElementById('tableHeader');
            const body = document.getElementById('tableBody');
            const dates = [];
            let startLimit = new Date(2026, 2, 30);
            let today = new Date();
            let temp = (today > startLimit) ? today : new Date(startLimit);

            while(dates.length < 5) {
                if(temp.getDay() !== 0 && temp.getDay() !== 6) dates.push(new Date(temp));
                temp.setDate(temp.getDate() + 1);
            }

            header.innerHTML = '<th class="name-cell p-5 font-black text-slate-900 text-sm italic">รายชื่อคณะผู้บริหาร</th>';
            dates.forEach((d, idx) => {
                const isToday = normalizeDate(d) === normalizeDate(new Date());
                header.innerHTML += `<th class="date-cell ${isToday ? 'today-banner shadow-inner' : ''}">
                    <div class="text-[9px] font-bold uppercase tracking-tighter">${d.toLocaleDateString('th-TH', {weekday:'short'})}</div>
                    <div class="text-sm font-black">${d.getDate()}</div></th>`;
            });

            body.innerHTML = '';
            rawStatus.forEach(person => {
                let row = `<tr class="bg-white hover:bg-slate-50 transition-colors"><td class="name-cell p-5 border-b border-slate-100">
                    <div class="text-[13px] font-[800] text-slate-900 leading-tight">${person.Name}</div>
                    <div class="text-[9px] font-bold text-sky-600 uppercase mt-0.5 tracking-tighter">${person.Role}</div></td>`;
                
                dates.forEach((date, idx) => {
                    const target = normalizeDate(date);
                    const isToday = target === normalizeDate(new Date());
                    const schedule = rawSchedule.find(s => target >= normalizeDate(s.StartDate) && target <= normalizeDate(s.EndDate) && s.Name.trim() === person.Name.trim());
                    const isDirAbsent = rawSchedule.some(s => target >= normalizeDate(s.StartDate) && target <= normalizeDate(s.EndDate) && s.Name.includes('ฑิราณี'));

                    let content = '<div class="status-vivid-tick">✅</div>';
                    if(schedule) {
                        content = `<div onclick="showDetail('${person.Name}', '${schedule.Reason}', '${schedule.StartDate}', '${schedule.EndDate}')" class="btn-interact status-vivid-cross">❌</div>`;
                    } else if(person.Name.includes('ทนงศักดิ์') && isDirAbsent) {
                        content = `<div class="flex flex-col items-center"><span class="text-xl">👑</span><span class="text-[7px] font-black text-blue-600 leading-none mt-1">รักษาราชการแทน ผอ.</span></div>`;
                    }
                    row += `<td class="date-cell border-b border-slate-50 ${isToday ? 'today-column-highlight' : ''}">${content}</td>`;
                });
                body.innerHTML += row + '</tr>';
            });
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const monthYear = document.getElementById('calMonthYear');
            grid.innerHTML = '';
            const y = viewDate.getFullYear(); const m = viewDate.getMonth();
            monthYear.innerText = new Intl.DateTimeFormat('th-TH', {month:'long', year:'numeric'}).format(viewDate);
            ["อา","จ","อ","พ","พฤ","ศ","ส"].forEach(d => grid.innerHTML += `<div class="text-center font-black text-slate-300 text-[8px] py-1 uppercase">${d}</div>`);
            const first = new Date(y, m, 1).getDay(); const days = new Date(y, m + 1, 0).getDate();
            for(let i=0; i<first; i++) grid.innerHTML += '<div></div>';
            for(let d=1; d<=days; d++) {
                const current = normalizeDate(new Date(y, m, d));
                const isToday = current === normalizeDate(new Date());
                const isStarted = current >= normalizeDate(new Date(2026, 2, 30));
                let peopleList = isStarted ? rawStatus.map(p => {
                    const sched = rawSchedule.find(s => current >= normalizeDate(s.StartDate) && current <= normalizeDate(s.EndDate) && s.Name.trim() === p.Name.trim());
                    return `<div onclick="${sched ? `showDetail('${p.Name}', '${sched.Reason}', '${sched.StartDate}', '${sched.EndDate}')` : ''}" class="flex justify-between items-center text-[7px] mb-0.5 ${sched ? 'text-red-600 font-black btn-interact' : 'font-bold text-slate-400'}">
                        <span>${p.Name.split(' ')[0]}</span><span>${sched ? '❌' : '✅'}</span></div>`;
                }).join('') : '';
                grid.innerHTML += `<div class="min-h-[85px] bg-white border border-slate-100 rounded-2xl p-1.5 flex flex-col ${isToday ? 'ring-2 ring-sky-500 shadow-md' : ''}">
                    <div class="text-[9px] font-black mb-1 ${isToday ? 'text-sky-600' : 'text-slate-300'}">${d}</div><div class="flex-1">${peopleList}</div></div>`;
            }
        }

        function changeMonth(s) { viewDate.setMonth(viewDate.getMonth() + s); renderCalendar(); }
        function populateAdminSelect() { document.getElementById('adminNameSelect').innerHTML = rawStatus.map(p => `<option value="${p.Name}">${p.Name}</option>`).join(''); }
        async function submitAbsence() {
            const btn = document.getElementById('submitBtn');
            const data = { action: 'addAbsence', name: document.getElementById('adminNameSelect').value, startDate: document.getElementById('startDate').value, endDate: document.getElementById('endDate').value, reason: document.getElementById('reason').value };
            if(!data.startDate || !data.endDate || !data.reason) return Swal.fire('Error', 'กรุณากรอกข้อมูลให้ครบ', 'warning');
            btn.disabled = true; btn.innerHTML = 'PROCESSING...';
            try { await fetch(API_URL, { method:'POST', body: JSON.stringify(data) }); Swal.fire({ title: 'สำเร็จ', icon: 'success', confirmButtonColor: '#0f172a' }); await loadAllData(); showTab('home'); } catch (e) { Swal.fire('Error', 'Failed', 'error'); } 
            finally { btn.disabled = false; btn.innerHTML = 'SUBMIT RECORD'; }
        }
        loadAllData();
    </script>
</body>
</html>
