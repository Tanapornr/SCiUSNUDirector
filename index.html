<script>
        // =========================================================================
        // 🔴 นำ URL ที่ได้จากการ Deploy ด้วย Gmail ส่วนตัว มาใส่ตรงนี้ครับ 🔴
        // =========================================================================
        const GAS_BASE_URL = 'https://script.google.com/macros/s/AKfycbwKYwZlUbOrtlrPnTEpKAtRZQ2uV4qoZceFCv1tfoAkpViE5vAaWMThDrFs4Txlshil/exec'; 
        
        const API_STATUS = `${GAS_BASE_URL}?sheet=Status`;
        const API_CALENDAR = `${GAS_BASE_URL}?sheet=Schedule`;

        // =========================================================================
        // 1. ระบบ Tab Navigation
        // =========================================================================
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-buttons button').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            document.getElementById(`btn-${tabId}`).classList.add('active');

            if(tabId === 'statusTab') loadStatusData();
            if(tabId === 'calendarTab' && calendarData.length === 0) loadCalendarData();
        }

        // =========================================================================
        // 2. ฟังก์ชัน TAB 1: ดึงข้อมูลและประมวลผลสถานะอัตโนมัติ (เงื่อนไข ฑิราณี & ทนงศักดิ์)
        // =========================================================================
        async function loadStatusData() {
            const board = document.getElementById('statusBoard');
            try {
                // โหลดข้อมูล Status และ Schedule พร้อมกัน
                const [statusRes, calendarRes] = await Promise.all([
                    fetch(API_STATUS, { redirect: 'follow' }),
                    fetch(API_CALENDAR, { redirect: 'follow' })
                ]);
                
                const statusData = await statusRes.json();
                const calendarData = await calendarRes.json();
                
                if(statusData.error) throw new Error(statusData.error);
                
                // หาวันที่ปัจจุบัน (รูปแบบ YYYY-MM-DD)
                const today = new Date();
                const year = today.getFullYear();
                const month = String(today.getMonth() + 1).padStart(2, '0');
                const day = String(today.getDate()).padStart(2, '0');
                const todayString = `${year}-${month}-${day}`;
                
                // เช็คว่าเป็นวันหยุดเสาร์-อาทิตย์หรือไม่ (0 = อาทิตย์, 6 = เสาร์)
                const isWeekend = (today.getDay() === 0 || today.getDay() === 6);
                
                // ดึงคิวงานของ "วันนี้" จากปฏิทิน
                const todaysEvents = calendarData.filter(e => e.date === todayString);
                
                // --- ตรวจสอบสถานะ ผอ. ฑิราณี ---
                // เช็คจากปฏิทินว่ามีคิวไปราชการ/ลา หรือไม่
                const dirCalendarAbsent = todaysEvents.some(e => e.name && e.name.includes('ฑิราณี') && e.type === 'absent');
                // เช็คจากหน้าสถานะวันนี้ ว่ามีคนกดเป็น ไม่อยู่/ลา หรือไม่
                const dirManualStatus = statusData.find(p => p.Name && p.Name.includes('ฑิราณี'))?.Status;
                
                // สรุปว่า ผอ. ไม่อยู่ใช่หรือไม่? (เข้าเงื่อนไขใดเงื่อนไขหนึ่ง ถือว่าไม่อยู่)
                const isDirectorAbsent = dirCalendarAbsent || (dirManualStatus === 'ไม่อยู่' || dirManualStatus === 'ลา');

                board.innerHTML = '';
                
                statusData.forEach(person => {
                    if(!person.Name) return; // ข้ามแถวว่าง

                    // ถ้ายังไม่มีการอัปเดต ให้ถือว่า "อยู่" ไว้ก่อน
                    let currentStatus = person.Status || 'อยู่'; 
                    let displayStatus = currentStatus; 
                    let statusClass = 'status-in';
                    let isAuto = false;

                    // --- เริ่มเช็คเงื่อนไขเรียงตามลำดับความสำคัญ ---
                    
                    if (isWeekend) {
                        // 1. ถ้าเป็นเสาร์-อาทิตย์ ให้ทุกคนขึ้นวันหยุด
                        displayStatus = 'วันหยุดเสาร์-อาทิตย์';
                        statusClass = 'status-leave';
                        isAuto = true;
                    } else {
                        // 2. ค้นหาว่าคนๆ นี้มีคิวในปฏิทินวันนี้ไหม
                        const myEvent = todaysEvents.find(e => e.name && (e.name.includes(person.Name) || person.Name.includes(e.name)));
                        
                        if (myEvent) {
                            displayStatus = myEvent.status; 
                            if(myEvent.type === 'absent') statusClass = 'status-out';
                            if(myEvent.type === 'meeting') statusClass = 'status-meeting';
                            if(myEvent.type === 'acting') statusClass = 'status-acting';
                            isAuto = true;
                        } else {
                            // จัดสีตามสถานะปกติที่กดมือ
                            if(currentStatus === 'อยู่') statusClass = 'status-in';
                            else if(currentStatus === 'ไม่อยู่') statusClass = 'status-out';
                            else if(currentStatus === 'ประชุม') statusClass = 'status-meeting';
                            else if(currentStatus === 'ลา') statusClass = 'status-leave';
                        }

                        // 🌟 กฎพิเศษ: ผู้อำนวยการ ฑิราณี
                        if (person.Name.includes('ฑิราณี')) {
                            // ถ้า ผอ. ไม่ได้ไม่อยู่ และสถานะปัจจุบันคือ "อยู่"
                            if (!isDirectorAbsent && currentStatus === 'อยู่') {
                                displayStatus = 'อยู่ (ผู้มีอำนาจลงนาม)';
                                statusClass = 'status-in';
                            }
                        }

                        // 🌟 กฎพิเศษ: รักษาราชการแทน ทนงศักดิ์
                        if (person.Name.includes('ทนงศักดิ์') && isDirectorAbsent) {
                            // เช็คเพื่อความชัวร์ว่าอาจารย์ทนงศักดิ์ไม่ได้ลาซะเอง
                            if (!myEvent || myEvent.type !== 'absent') {
                                if (currentStatus !== 'ไม่อยู่' && currentStatus !== 'ลา') {
                                    displayStatus = 'รักษาราชการแทน ผอ.';
                                    statusClass = 'status-acting';
                                    isAuto = true; // ล็อกสถานะไว้เป็นอัตโนมัติ
                                }
                            }
                        }
                    }

                    // สร้างปุ่มอัปเดต (ซ่อนปุ่มไว้ถ้าเป็นระบบอัตโนมัติ)
                    const actionHTML = isAuto ? 
                        `<span class="auto-text">(อัปเดตอัตโนมัติ)</span>` :
                        `<select id="select-${person.ID}">
                            <option value="อยู่" ${currentStatus === 'อยู่' ? 'selected' : ''}>อยู่</option>
                            <option value="ไม่อยู่" ${currentStatus === 'ไม่อยู่' ? 'selected' : ''}>ไม่อยู่</option>
                            <option value="ประชุม" ${currentStatus === 'ประชุม' ? 'selected' : ''}>ประชุม</option>
                            <option value="ลา" ${currentStatus === 'ลา' ? 'selected' : ''}>ลา</option>
                        </select>
                        <button class="btn-update" onclick="updateStatus('${person.ID}')">บันทึก</button>`;

                    // วาดการ์ดแสดงผล
                    board.innerHTML += `
                        <div class="person-card">
                            <div class="info">
                                <div class="name">${person.Name}</div>
                                <div class="role">${person.Role || ''}</div>
                            </div>
                            <div>
                                <span class="status-badge ${statusClass}" id="badge-${person.ID}">${displayStatus}</span>
                            </div>
                            <div class="action-area">
                                ${actionHTML}
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                board.innerHTML = `<div class="error">เกิดข้อผิดพลาดในการโหลดข้อมูล: ${error.message}</div>`;
            }
        }

        // =========================================================================
        // 3. ฟังก์ชันอัปเดตสถานะกลับไปที่ Google Sheets (เวลากดปุ่มบันทึก)
        // =========================================================================
        async function updateStatus(id) {
            const newStatus = document.getElementById(`select-${id}`).value;
            const badge = document.getElementById(`badge-${id}`);
            const originalText = badge.innerText;
            
            badge.innerText = 'บันทึก...';
            badge.className = 'status-badge'; 

            try {
                const response = await fetch(GAS_BASE_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ id: id, status: newStatus }),
                    redirect: 'follow'
                });
                const result = await response.json();
                
                if(result.status === 'success') {
                    loadStatusData(); // โหลดใหม่เพื่ออัปเดตสถานะที่เปลี่ยนไป
                } else {
                    alert('เกิดข้อผิดพลาด: ' + result.message);
                    badge.innerText = originalText;
                }
            } catch (error) {
                alert('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้');
                badge.innerText = originalText;
            }
        }

        // =========================================================================
        // 4. ฟังก์ชัน TAB 2: โหลดและแสดงผลปฏิทินปฏิบัติงาน
        // =========================================================================
        let currentDate = new Date(); 
        let calendarData = [];
        const monthNamesTH = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        const dayNamesTH = ["อาทิตย์", "จันทร์", "อังคาร", "พุธ", "พฤหัสฯ", "ศุกร์", "เสาร์"];

        async function loadCalendarData() {
            try {
                const response = await fetch(API_CALENDAR, { redirect: 'follow' });
                calendarData = await response.json();
                if(calendarData.error) throw new Error(calendarData.error);
                renderCalendar();
            } catch (error) {
                document.getElementById('calendarGrid').innerHTML = `<div style="grid-column: 1 / -1;" class="error">เกิดข้อผิดพลาด: ${error.message}</div>`;
            }
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('monthYearDisplay').innerText = `${monthNamesTH[month]} ${year + 543}`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            dayNamesTH.forEach(day => {
                grid.innerHTML += `<div class="day-name">${day}</div>`;
            });

            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="day-cell empty-cell"></div>`;
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateString = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                
                const dayEvents = calendarData.filter(e => e.date === dateString)
                                              .sort((a, b) => (a.type === 'absent' ? -1 : 1));
                
                let eventsHTML = '';
                dayEvents.forEach(event => {
                    let eventClass = 'event-work';
                    if(event.type === 'absent') eventClass = 'event-absent';
                    if(event.type === 'acting') eventClass = 'event-acting';
                    if(event.type === 'meeting') eventClass = 'event-meeting';
                    
                    const pos = event.Position ? `<span class="position-text">(${event.Position})</span>` : '';
                    eventsHTML += `
                        <div class="event ${eventClass}" title="${event.name} ${event.Position || ''}: ${event.status}">
                            <strong>${event.name}</strong> ${pos}<br>${event.status}
                        </div>
                    `;
                });

                grid.innerHTML += `
                    <div class="day-cell">
                        <div class="day-number">${day}</div>
                        ${eventsHTML}
                    </div>
                `;
            }
        }

        function changeMonth(step) {
            currentDate.setMonth(currentDate.getMonth() + step);
            renderCalendar();
        }

        // =========================================================================
        // เริ่มต้นการทำงานเมื่อโหลดหน้าเว็บ
        // =========================================================================
        loadStatusData(); 

    </script>
