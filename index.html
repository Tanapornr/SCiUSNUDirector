<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Executive Hub - SCiUS NU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --biz-navy: #0f172a; --biz-blue: #0284c7; --biz-bg: #f8fafc; }
        body { font-family: 'Sarabun', -apple-system, sans-serif; background-color: var(--biz-bg); color: #1e293b; overflow-x: hidden; }
        .biz-header { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); border-bottom: 4px solid #f59e0b; }
        .tab-btn { transition: all 0.3s ease; font-weight: 800; }
        .tab-active { color: #0f172a !important; background: #ffffff; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .executive-card { background: #ffffff; border-radius: 24px; box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.08); border: 1px solid rgba(226, 232, 240, 0.8); }
        .status-table { width: 100%; table-layout: fixed; border-collapse: collapse; }
        .name-cell { width: 42%; padding: 12px 8px !important; text-align: left; background-color: #ffffff; }
        .date-cell { width: 11.6%; padding: 10px 0 !important; text-align: center; }
        .today-banner { background-color: var(--biz-navy) !important; color: white !important; }
        .today-column-bg { background-color: rgba(2, 132, 199, 0.03) !important; }
        .vivid-tick { color: #059669; font-size: 1.4rem; font-weight: bold; opacity: 1 !important; }
        .vivid-cross { color: #dc2626; font-size: 1.4rem; cursor: pointer; opacity: 1 !important; }
        .exec-name { font-size: 12px; line-height: 1.2; font-weight: 800; }
        @media (min-width: 768px) { .exec-name { font-size: 15px; } }
        
        input[type="date"]::-webkit-calendar-picker-indicator { opacity: 1; display: block; cursor: pointer; }
        input[type="date"], input[type="text"].date-hack { color: #1e293b !important; appearance: none; -webkit-appearance: none; }
    </style>
</head>
<body class="pb-12">

    <header class="biz-header sticky top-0 z-50 shadow-xl">
        <div class="max-w-4xl mx-auto px-4 flex justify-between items-center h-16 md:h-20">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 md:w-10 md:h-10 bg-white rounded-lg flex items-center justify-center shadow-lg">
                    <span class="text-slate-900 font-black text-lg md:text-xl">S</span>
                </div>
                <div>
                    <h1 class="text-white font-extrabold text-sm md:text-lg leading-tight">Executive Plan</h1>
                    <p class="text-[8px] md:text-[10px] text-orange-400 font-bold uppercase tracking-widest leading-none">SCiUS Naresuan</p>
                </div>
            </div>
            <div class="flex bg-black/20 p-1 rounded-xl gap-0.5 overflow-x-auto">
                <button id="btn-home" onclick="showTab('home')" class="tab-btn px-2.5 py-1.5 text-[10px] md:text-xs text-white/60 tab-active whitespace-nowrap">สถานะ</button>
                <button id="btn-calendar" onclick="showTab('calendar')" class="tab-btn px-2.5 py-1.5 text-[10px] md:text-xs text-white/60 whitespace-nowrap">ปฏิทิน</button>
                <button id="btn-add" onclick="showTab('add')" class="tab-btn px-2.5 py-1.5 text-[10px] md:text-xs text-white/60 whitespace-nowrap">ลงข้อมูล</button>
                <button id="btn-edit" onclick="showTab('edit')" class="tab-btn px-2.5 py-1.5 text-[10px] md:text-xs text-white/60 bg-red-500/20 text-red-100 rounded-lg flex items-center gap-1 whitespace-nowrap">🔒 สำหรับเจ้าหน้าที่</button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-2 mt-6">
        
        <div id="tab-home" class="tab-content">
            <div class="flex items-end justify-between mb-4 px-2">
                <h2 class="text-xl font-extrabold text-slate-900 tracking-tighter">แผนปฏิบัติงาน 5 วัน</h2>
                <div class="flex items-center gap-1.5 text-[10px] text-emerald-600 font-black bg-emerald-50 border border-emerald-100 px-2.5 py-1.5 rounded-lg shadow-sm">
                    <span class="animate-pulse text-emerald-500">●</span> Real-time
                </div>
            </div>
            <div class="executive-card overflow-hidden">
                <table class="status-table">
                    <thead><tr id="tableHeader" class="bg-gray-100/50 border-b border-gray-100"></tr></thead>
                    <tbody id="tableBody" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
            <div class="mt-8 flex flex-wrap justify-center gap-4 text-[10px] font-bold text-slate-500">
                <div class="flex items-center gap-1"><span class="vivid-tick text-base">✅</span> อยู่ปฏิบัติงาน</div>
                <div class="flex items-center gap-1"><span class="vivid-cross text-base">❌</span> ลา/ราชการ (คลิก)</div>
                <div class="flex items-center gap-1"><span>👑</span> รักษาราชการแทน</div>
            </div>
        </div>

        <div id="tab-calendar" class="tab-content hidden px-1">
            <div class="executive-card p-4">
                <div class="flex justify-between items-center mb-6">
                    <button onclick="changeMonth(-1)" class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center font-black">‹</button>
                    <h2 id="calMonthYear" class="text-base font-extrabold text-slate-900"></h2>
                    <button onclick="changeMonth(1)" class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center font-black">›</button>
                </div>
                <div class="grid grid-cols-7 gap-1" id="calendarGrid"></div>
            </div>
        </div>

        <div id="tab-add" class="tab-content hidden px-2">
            <div class="max-w-sm mx-auto executive-card p-6 border-t-4 border-blue-500">
                <h2 class="text-xl font-extrabold text-slate-900 mb-6 flex items-center gap-2">➕ ลงข้อมูล</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-[11px] font-bold text-slate-500 mb-1 block">ชื่อผู้บริหาร</label>
                        <select id="addNameSelect" class="w-full p-3.5 bg-slate-50 border border-slate-200 text-slate-900 rounded-xl font-bold text-sm focus:ring-2 focus:ring-blue-400 focus:outline-none"></select>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[11px] font-bold text-slate-500 mb-1 block">เริ่มวันที่</label>
                            <input type="text" placeholder="วว/ดด/ปปปป" onfocus="(this.type='date')" onblur="(this.value == '' ? this.type='text' : this.type='date')" id="addStartDate" class="date-hack w-full p-3.5 bg-slate-50 border border-slate-200 text-slate-900 rounded-xl font-bold text-sm focus:outline-none">
                        </div>
                        <div>
                            <label class="text-[11px] font-bold text-slate-500 mb-1 block">ถึงวันที่</label>
                            <input type="text" placeholder="วว/ดด/ปปปป" onfocus="(this.type='date')" onblur="(this.value == '' ? this.type='text' : this.type='date')" id="addEndDate" class="date-hack w-full p-3.5 bg-slate-50 border border-slate-200 text-slate-900 rounded-xl font-bold text-sm focus:outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-slate-500 mb-1 block">หมายเหตุ</label>
                        <input type="text" id="addReason" placeholder="เช่น ไปราชการ กทม." class="w-full p-3.5 bg-slate-50 border border-slate-200 text-slate-900 rounded-xl font-bold text-sm focus:outline-none">
                    </div>
                    <button onclick="submitAdd()" id="btnAddSubmit" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl active:scale-95 transition-all text-sm uppercase mt-4 shadow-lg hover:bg-slate-800">บันทึกข้อมูล</button>
                </div>
            </div>
        </div>

        <div id="tab-edit" class="tab-content hidden px-1">
            <div class="max-w-lg mx-auto">
                
                <div id="editFormBlock" class="hidden bg-white p-5 rounded-2xl shadow-lg border-t-4 border-orange-500 mb-6">
                    <h3 class="text-sm font-extrabold text-slate-800 flex items-center gap-1 mb-4">✏️ กำลังแก้ไขข้อมูลของ: <span id="editNameDisplay" class="text-orange-600"></span></h3>
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <div>
                            <label class="text-[11px] font-bold text-slate-500 mb-1 block">เริ่มวันที่ใหม่</label>
                            <input type="text" placeholder="เลือกวัน" onfocus="(this.type='date')" onblur="(this.value == '' ? this.type='text' : this.type='date')" id="editStartDate" class="date-hack w-full p-3 bg-slate-50 border border-slate-200 text-slate-900 rounded-xl font-bold text-sm focus:outline-none focus:ring-2 focus:ring-orange-400">
                        </div>
                        <div>
                            <label class="text-[11px] font-bold text-slate-500 mb-1 block">ถึงวันที่ใหม่</label>
                            <input type="text" placeholder="เลือกวัน" onfocus="(this.type='date')" onblur="(this.value == '' ? this.type='text' : this.type='date')" id="editEndDate" class="date-hack w-full p-3 bg-slate-50 border border-slate-200 text-slate-900 rounded-xl font-bold text-sm focus:outline-none focus:ring-2 focus:ring-orange-400">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="text-[11px] font-bold text-slate-500 mb-1 block">หมายเหตุใหม่</label>
                        <input type="text" id="editReason" class="w-full p-3 bg-slate-50 border border-slate-200 text-slate-900 rounded-xl font-bold text-sm focus:outline-none focus:ring-2 focus:ring-orange-400">
                    </div>
                    <div class="flex gap-2">
                        <button onclick="submitEdit()" id="btnEditSubmit" class="flex-1 bg-orange-500 text-white font-black py-3 rounded-xl active:scale-95 transition-all text-xs uppercase shadow-md hover:bg-orange-600">อัปเดตข้อมูล</button>
                        <button onclick="cancelEdit()" class="w-1/3 bg-slate-200 text-slate-600 font-black py-3 rounded-xl active:scale-95 transition-all text-xs uppercase hover:bg-slate-300">ยกเลิก</button>
                    </div>
                </div>

                <div class="executive-card p-4">
                    <div class="flex justify-between items-center mb-4 border-b border-slate-100 pb-2">
                        <h2 class="text-lg font-extrabold text-slate-900">ตารางจัดการข้อมูล</h2>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] bg-red-100 text-red-600 px-2 py-1 rounded-md font-bold hidden md:inline-block">Admin Mode</span>
                            <button onclick="logoutAdmin()" class="text-[10px] bg-slate-200 hover:bg-slate-300 text-slate-700 px-2 py-1 rounded-md font-bold transition-all">ออกจากระบบ</button>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[300px]">
                            <thead>
                                <tr class="bg-slate-50 text-[10px] text-slate-500 uppercase border-b border-slate-200">
                                    <th class="p-2.5 rounded-tl-lg font-bold">ข้อมูลการลา</th>
                                    <th class="p-2.5 font-bold">วันที่</th>
                                    <th class="p-2.5 rounded-tr-lg font-bold text-center">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="editTableBody" class="text-xs divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>

    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwfqxOQk28891H2JnmnNetSgUmTLUyAD6cjj05OSXocSYWZeIuoT5S1f8_tqrot-gBAPg/exec';
        
        let rawStatus = []; let rawSchedule = []; let viewDate = new Date(2026, 2, 30);
        let isAdminAuthed = false; 
        let currentEditRowIndex = null;
        let currentEditName = "";

        // 📌 ระบบจับคู่รูปภาพผู้บริหาร
        const execImages = {
            "ฑิราณี": "https://img1.pic.in.th/images/thiranee-1.png",
            "ทนงศักดิ์": "https://img1.pic.in.th/images/thanongsak-1.png",
            "พิทักษ์": "https://img1.pic.in.th/images/pitak-1.png"
        };

        function getProfileImage(name) {
            for (let key in execImages) {
                if (name.includes(key)) return execImages[key];
            }
            return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=0f172a&color=fff`; // รูปสำรองถ้าไม่มีชื่อ
        }

        async function loadAllData(force = false, silent = false) {
            const cachedStatus = localStorage.getItem('sciStatus');
            const cachedSchedule = localStorage.getItem('sciSchedule');
            
            if (cachedStatus && cachedSchedule && !force) {
                rawStatus = JSON.parse(cachedStatus); rawSchedule = JSON.parse(cachedSchedule);
                renderHome(); renderCalendar(); populateAddSelect(); renderEditTable();
            } 
            
            try {
                const [res1, res2] = await Promise.all([
                    fetch(`${API_URL}?sheet=Status`, { redirect: 'follow' }),
                    fetch(`${API_URL}?sheet=Schedule`, { redirect: 'follow' })
                ]);
                rawStatus = await res1.json(); rawSchedule = await res2.json();
                
                localStorage.setItem('sciStatus', JSON.stringify(rawStatus));
                localStorage.setItem('sciSchedule', JSON.stringify(rawSchedule));
                
                renderHome(); renderCalendar(); populateAddSelect(); renderEditTable();
            } catch (e) { 
                console.log("Background sync failed");
            }
        }

        setInterval(() => { loadAllData(true, true); }, 30000);

        async function showTab(id) {
            if (id === 'edit' && !isAdminAuthed) {
                const { value: password } = await Swal.fire({
                    title: '🔒 สำหรับเจ้าหน้าที่',
                    input: 'password',
                    showCancelButton: true,
                    confirmButtonText: 'เข้าสู่ระบบ',
                    cancelButtonText: 'ยกเลิก',
                    confirmButtonColor: '#ef4444'
                });
                
                if (password === '1234') { 
                    isAdminAuthed = true;
                    Swal.fire({ title: 'เข้าสู่ระบบสำเร็จ', icon: 'success', timer: 1000, showConfirmButton: false });
                } else {
                    if (password) Swal.fire('ผิดพลาด', 'รหัสผ่านไม่ถูกต้อง', 'error');
                    return; 
                }
            }

            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById(`tab-${id}`).classList.remove('hidden');
            document.getElementById(`btn-${id}`).classList.add('tab-active');
            
            if(id !== 'edit') cancelEdit();
        }

        function logoutAdmin() {
            isAdminAuthed = false;
            cancelEdit();
            Swal.fire({ title: 'ออกจากระบบเรียบร้อย', icon: 'success', timer: 1000, showConfirmButton: false });
            showTab('home'); 
        }

        function normalizeDate(d) { if(!d) return null; const date = new Date(d); date.setHours(0,0,0,0); return date.getTime(); }

        function showDetail(name, reason, start, end) {
            const startDate = new Date(start).toLocaleDateString('th-TH', { day:'numeric', month:'short' });
            const endDate = new Date(end).toLocaleDateString('th-TH', { day:'numeric', month:'short' });
            Swal.fire({
                title: `<p class="text-[10px] font-black text-slate-400 uppercase mb-1">Absence Detail</p><p class="text-base font-black">${name}</p>`,
                html: `<div class="py-2"><p class="text-base font-bold text-red-500 mb-2">"${reason}"</p><p class="text-xs font-bold text-slate-400">ช่วงวันที่: ${startDate} - ${endDate}</p></div>`,
                confirmButtonText: 'รับทราบ', confirmButtonColor: '#0f172a'
            });
        }

        function renderHome() {
            const header = document.getElementById('tableHeader'); const body = document.getElementById('tableBody');
            const dates = []; let startLimit = new Date(2026, 2, 30); let today = new Date(); let temp = (today > startLimit) ? today : new Date(startLimit);
            while(dates.length < 5) { if(temp.getDay() !== 0 && temp.getDay() !== 6) dates.push(new Date(temp)); temp.setDate(temp.getDate() + 1); }

            header.innerHTML = '<th class="name-cell font-extrabold text-slate-900 text-sm md:text-base">คณะผู้บริหาร</th>';
            dates.forEach((d, idx) => {
                const isToday = normalizeDate(d) === normalizeDate(new Date());
                header.innerHTML += `<th class="date-cell ${isToday ? 'today-banner' : 'text-slate-900'}"><div class="text-[11px] md:text-sm font-black uppercase">${d.toLocaleDateString('th-TH', {weekday:'short'})}</div><div class="text-sm md:text-base font-black">${d.getDate()}</div></th>`;
            });

            body.innerHTML = '';
            rawStatus.forEach(person => {
                // 🟢 ดึงรูปภาพตามชื่อ
                let imgUrl = getProfileImage(person.Name);
                
                // 🟢 สร้างโครงสร้างแบบมีรูปภาพ
                let row = `<tr class="bg-white"><td class="name-cell border-b border-gray-50">
                    <div class="flex items-center gap-2 md:gap-3">
                        <img src="${imgUrl}" class="w-8 h-8 md:w-10 md:h-10 rounded-full object-cover border border-slate-200 shadow-sm shrink-0 bg-slate-100">
                        <div>
                            <div class="exec-name text-slate-900">${person.Name}</div>
                            <div class="text-[8px] md:text-[9px] font-black text-blue-500 uppercase tracking-tighter mt-0.5">${person.Role}</div>
                        </div>
                    </div>
                </td>`;
                
                dates.forEach((date, idx) => {
                    const target = normalizeDate(date);
                    const isToday = target === normalizeDate(new Date());
                    const schedule = rawSchedule.find(s => target >= normalizeDate(s.StartDate) && target <= normalizeDate(s.EndDate) && s.Name.trim() === person.Name.trim());
                    const isDirAbsent = rawSchedule.some(s => target >= normalizeDate(s.StartDate) && target <= normalizeDate(s.EndDate) && s.Name.includes('ฑิราณี'));

                    let content = '<div class="vivid-tick">✅</div>';
                    if(schedule) { content = `<div onclick="showDetail('${person.Name}', '${schedule.Reason}', '${schedule.StartDate}', '${schedule.EndDate}')" class="vivid-cross">❌</div>`; } 
                    else if(person.Name.includes('ทนงศักดิ์') && isDirAbsent) { content = `<div class="flex flex-col items-center"><span class="text-base md:text-xl">👑</span><span class="text-[6px] md:text-[7px] font-black text-blue-600 leading-none mt-1">รักษาราชการแทน</span></div>`; }
                    row += `<td class="date-cell border-b border-gray-50 ${isToday ? 'today-column-bg' : ''}">${content}</td>`;
                });
                body.innerHTML += row + '</tr>';
            });
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid'); const monthYear = document.getElementById('calMonthYear'); grid.innerHTML = '';
            const y = viewDate.getFullYear(); const m = viewDate.getMonth();
            monthYear.innerText = new Intl.DateTimeFormat('th-TH', {month:'long', year:'numeric'}).format(viewDate);
            ["อา","จ","อ","พ","พฤ","ศ","ส"].forEach(d => grid.innerHTML += `<div class="text-center font-black text-gray-400 text-[9px] py-1 uppercase">${d}</div>`);
            const first = new Date(y, m, 1).getDay(); const days = new Date(y, m + 1, 0).getDate();
            for(let i=0; i<first; i++) grid.innerHTML += '<div></div>';
            for(let d=1; d<=days; d++) {
                const current = normalizeDate(new Date(y, m, d)); const isToday = current === normalizeDate(new Date()); const isStarted = current >= normalizeDate(new Date(2026, 2, 30));
                let peopleList = isStarted ? rawStatus.map(p => {
                    const sched = rawSchedule.find(s => current >= normalizeDate(s.StartDate) && current <= normalizeDate(s.EndDate) && s.Name.trim() === p.Name.trim());
                    return `<div onclick="${sched ? `showDetail('${p.Name}', '${sched.Reason}', '${sched.StartDate}', '${sched.EndDate}')` : ''}" class="flex justify-between items-center text-[7px] mb-0.5 ${sched ? 'text-red-500 font-bold' : 'font-bold text-gray-400'}"><span>${p.Name.split(' ')[0]}</span><span>${sched ? '❌' : '✅'}</span></div>`;
                }).join('') : '';
                grid.innerHTML += `<div class="min-h-[70px] bg-white border border-slate-100 rounded-xl p-1 flex flex-col ${isToday ? 'ring-2 ring-blue-500 shadow-sm' : ''}"><div class="text-[9px] font-black mb-1 ${isToday ? 'text-blue-600' : 'text-slate-400'}">${d}</div><div class="flex-1">${peopleList}</div></div>`;
            }
        }

        function changeMonth(s) { viewDate.setMonth(viewDate.getMonth() + s); renderCalendar(); }
        function populateAddSelect() { document.getElementById('addNameSelect').innerHTML = rawStatus.map(p => `<option value="${p.Name}">${p.Name}</option>`).join(''); }

        function renderEditTable() {
            const tbody = document.getElementById('editTableBody');
            if(!tbody) return;
            tbody.innerHTML = '';
            
            const validSchedules = rawSchedule.filter(s => s.Name && s._rowIndex);
            const sortedSchedule = [...validSchedules].reverse(); 
            
            if(sortedSchedule.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" class="text-center py-6 text-slate-400 text-[10px]">ไม่มีข้อมูลการลา</td></tr>`;
                return;
            }

            sortedSchedule.forEach(s => {
                const sd = new Date(s.StartDate).toLocaleDateString('th-TH', {day:'numeric', month:'short'});
                const ed = new Date(s.EndDate).toLocaleDateString('th-TH', {day:'numeric', month:'short'});
                
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="p-2.5 py-3">
                            <div class="font-bold text-slate-900 whitespace-nowrap">${s.Name.split(' ')[0]}</div>
                            <div class="text-[9px] font-bold text-orange-600 truncate max-w-[120px]" title="${s.Reason}">${s.Reason}</div>
                        </td>
                        <td class="p-2.5 text-[10px] text-slate-600 font-bold whitespace-nowrap">
                            ${sd} - ${ed}
                        </td>
                        <td class="p-2.5 text-center whitespace-nowrap">
                            <button onclick="openEditForm(${s._rowIndex}, '${s.Name}', '${s.Reason}')" class="p-2 bg-slate-100 rounded-lg text-slate-600 shadow-sm hover:bg-orange-100 hover:text-orange-600 transition-colors mr-1">✏️</button>
                            <button onclick="deleteRecord(${s._rowIndex})" class="p-2 bg-red-50 rounded-lg text-red-500 shadow-sm hover:bg-red-500 hover:text-white transition-colors">❌</button>
                        </td>
                    </tr>
                `;
            });
        }

        async function submitAdd() {
            const btn = document.getElementById('btnAddSubmit');
            const data = { 
                action: 'addAbsence', 
                name: document.getElementById('addNameSelect').value, 
                startDate: document.getElementById('addStartDate').value, 
                endDate: document.getElementById('addEndDate').value, 
                reason: document.getElementById('addReason').value 
            };
            
            if(!data.startDate || !data.endDate || !data.reason) return Swal.fire('ข้อมูลไม่ครบ', 'กรุณากรอกวันที่และหมายเหตุ', 'warning');
            
            btn.disabled = true; btn.innerHTML = 'กำลังบันทึก...';
            try { 
                await fetch(API_URL, { method:'POST', body: JSON.stringify(data) }); 
                Swal.fire({ title: 'สำเร็จ!', icon: 'success', confirmButtonColor: '#0f172a' }); 
                document.getElementById('addStartDate').value = ''; 
                document.getElementById('addEndDate').value = ''; 
                document.getElementById('addReason').value = ''; 
                await loadAllData(true); 
                showTab('home'); 
            } catch (e) { 
                Swal.fire('Error', 'เกิดข้อผิดพลาดในการส่งข้อมูล', 'error'); 
            } finally { 
                btn.disabled = false; btn.innerHTML = 'บันทึกข้อมูล'; 
            }
        }

        async function deleteRecord(rowIndex) {
            const res = await Swal.fire({ 
                title: 'ยกเลิกการลา?', 
                text: "ลบรายการนี้แล้ว สถานะจะกลับไปเป็น ✅ ปฏิบัติงาน", 
                icon: 'warning', 
                showCancelButton: true, 
                confirmButtonColor: '#ef4444', 
                confirmButtonText: 'ลบเลย!' 
            });
            if(!res.isConfirmed) return;
            
            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteAbsence', rowIndex: rowIndex }) });
                Swal.fire('สำเร็จ', 'ข้อมูลถูกยกเลิกแล้ว', 'success');
                await loadAllData(true); 
            } catch(e) { 
                Swal.fire('Error', 'ไม่สามารถลบข้อมูลได้', 'error'); 
            }
        }

        function openEditForm(rowIndex, name, reason) {
            currentEditRowIndex = rowIndex;
            currentEditName = name;
            document.getElementById('editNameDisplay').innerText = name;
            document.getElementById('editReason').value = reason;
            document.getElementById('editStartDate').value = ''; document.getElementById('editStartDate').type = 'text';
            document.getElementById('editEndDate').value = ''; document.getElementById('editEndDate').type = 'text';
            document.getElementById('editFormBlock').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            currentEditRowIndex = null;
            document.getElementById('editFormBlock').classList.add('hidden');
        }

        async function submitEdit() {
            const btn = document.getElementById('btnEditSubmit');
            const data = { 
                action: 'editAbsence', 
                rowIndex: currentEditRowIndex,
                name: currentEditName, 
                startDate: document.getElementById('editStartDate').value, 
                endDate: document.getElementById('editEndDate').value, 
                reason: document.getElementById('editReason').value 
            };
            
            if(!data.startDate || !data.endDate || !data.reason) return Swal.fire('ข้อมูลไม่ครบ', 'กรุณาเลือกวันที่ใหม่ให้ครบถ้วน', 'warning');
            
            btn.disabled = true; btn.innerHTML = 'กำลังอัปเดต...';
            try { 
                await fetch(API_URL, { method:'POST', body: JSON.stringify(data) }); 
                Swal.fire({ title: 'อัปเดตสำเร็จ!', icon: 'success', confirmButtonColor: '#f97316' }); 
                cancelEdit(); 
                await loadAllData(true); 
            } catch (e) { 
                Swal.fire('Error', 'ไม่สามารถอัปเดตข้อมูลได้', 'error'); 
            } finally { 
                btn.disabled = false; btn.innerHTML = 'อัปเดตข้อมูล'; 
            }
        }

        loadAllData();
    </script>
</body>
</html>
