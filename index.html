<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Hub - SCiUS NU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Sarabun", sans-serif; 
            background-color: var(--ios-bg); 
            color: #000;
        }
        /* iOS Glassmorphism */
        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
        }
        .tab-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 12px;
        }
        .tab-active {
            background-color: rgba(0, 122, 255, 0.1);
            color: var(--ios-blue) !important;
        }
        .ios-card {
            background: var(--ios-card);
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        /* Sticky Column for iOS feel */
        .sticky-col {
            position: sticky;
            left: 0;
            background: #fff;
            z-index: 20;
            box-shadow: 4px 0 10px rgba(0,0,0,0.02);
        }
        .today-highlight {
            background-color: rgba(0, 122, 255, 0.03) !important;
        }
        /* Hide scrollbar but keep functionality */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        input, select {
            -webkit-appearance: none;
            outline: none;
        }
    </style>
</head>
<body class="pb-10">

    <header class="glass-nav sticky top-0 z-50 border-b border-gray-200">
        <div class="max-w-6xl mx-auto px-5 flex justify-between items-center h-16">
            <div class="flex flex-col">
                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] leading-none">SCiUS Naresuan</span>
                <h1 class="text-lg font-bold text-black leading-tight">คณะผู้บริหาร</h1>
            </div>
            <div class="flex bg-gray-100/80 p-1 rounded-xl">
                <button id="btn-home" onclick="showTab('home')" class="tab-btn px-4 py-1.5 text-sm font-semibold text-gray-500 tab-active">สถานะ</button>
                <button id="btn-calendar" onclick="showTab('calendar')" class="tab-btn px-4 py-1.5 text-sm font-semibold text-gray-500">ปฏิทิน</button>
                <button id="btn-admin" onclick="showTab('admin')" class="tab-btn px-4 py-1.5 text-sm font-semibold text-gray-500">จัดการ</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-5 mt-8">
        
        <div id="tab-home" class="tab-content transition-opacity duration-300">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-2xl font-bold tracking-tight text-black">แผนปฏิบัติงาน 5 วัน</h2>
                <button onclick="loadAllData()" class="text-blue-500 font-medium text-sm">รีเฟรช</button>
            </div>
            
            <div class="ios-card overflow-hidden">
                <div class="overflow-x-auto no-scrollbar">
                    <table class="w-full border-collapse">
                        <thead>
                            <tr id="tableHeader" class="bg-gray-50/50 text-[11px] font-bold text-gray-400 uppercase tracking-widest border-b border-gray-100"></tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-gray-50"></tbody>
                    </table>
                </div>
            </div>
            <p class="mt-4 text-[11px] text-gray-400 text-center px-4">ระบบคำนวณสถานะรักษาราชการแทนอัตโนมัติเมื่อท่านผู้อำนวยการไม่อยู่ปฏิบัติหน้าที่</p>
        </div>

        <div id="tab-calendar" class="tab-content hidden">
            <div class="ios-card p-6">
                <div class="flex justify-between items-center mb-6">
                    <button onclick="changeMonth(-1)" class="text-blue-500 font-bold p-2">◀</button>
                    <h2 id="calMonthYear" class="text-xl font-bold text-black"></h2>
                    <button onclick="changeMonth(1)" class="text-blue-500 font-bold p-2">▶</button>
                </div>
                <div class="grid grid-cols-7 gap-2" id="calendarGrid"></div>
            </div>
        </div>

        <div id="tab-admin" class="tab-content hidden">
            <div class="max-w-md mx-auto ios-card p-8">
                <div class="mb-6">
                    <h2 class="text-2xl font-bold text-black">ลงข้อมูลล่วงหน้า</h2>
                    <p class="text-sm text-gray-400">ระบุช่วงวันที่ที่คณะผู้บริหารไม่อยู่</p>
                </div>
                <div class="space-y-5">
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase px-1">ผู้บริหาร</label>
                        <select id="adminNameSelect" class="w-full mt-1 p-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-blue-500/20"></select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs font-bold text-gray-400 uppercase px-1">ตั้งแต่วันที่</label>
                            <input type="date" id="startDate" class="w-full mt-1 p-4 bg-gray-50 rounded-2xl border-none">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-400 uppercase px-1">ถึงวันที่</label>
                            <input type="date" id="endDate" class="w-full mt-1 p-4 bg-gray-50 rounded-2xl border-none">
                        </div>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase px-1">เหตุผล (เช่น ไปราชการ)</label>
                        <input type="text" id="reason" placeholder="เช่น ไปราชการ กทม." class="w-full mt-1 p-4 bg-gray-50 rounded-2xl border-none">
                    </div>
                    <button id="submitBtn" onclick="submitAbsence()" class="w-full bg-[#007AFF] hover:bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-500/30 transition-all active:scale-95">
                        บันทึกข้อมูล
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="loader" class="fixed inset-0 bg-white/60 backdrop-blur-md z-[100] flex items-center justify-center hidden">
        <div class="flex flex-col items-center">
            <div class="w-10 h-10 border-3 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            <span class="mt-4 text-xs font-bold text-blue-500 uppercase tracking-widest">กำลังโหลด</span>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzxT63E3SeiMZoWeK_KbVD1Ci8DHp6L_VzRFsE9tcF3cvB1d2VsoVr2hPj9tq3Azt4dgg/exec';

        let rawStatus = [];
        let rawSchedule = [];
        let viewDate = new Date();

        async function loadAllData() {
            document.getElementById('loader').classList.remove('hidden');
            try {
                const [res1, res2] = await Promise.all([
                    fetch(`${API_URL}?sheet=Status`, { redirect: 'follow' }),
                    fetch(`${API_URL}?sheet=Schedule`, { redirect: 'follow' })
                ]);
                rawStatus = await res1.json();
                rawSchedule = await res2.json();
                renderHome();
                renderCalendar();
                populateAdminSelect();
            } catch (e) {
                Swal.fire('Error', 'ไม่สามารถเชื่อมต่อได้', 'error');
            } finally {
                document.getElementById('loader').classList.add('hidden');
            }
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById(`tab-${id}`).classList.remove('hidden');
            document.getElementById(`btn-${id}`).classList.add('tab-active');
        }

        function normalizeDate(d) {
            if(!d) return null;
            const date = new Date(d);
            date.setHours(0,0,0,0);
            return date.getTime();
        }

        function renderHome() {
            const header = document.getElementById('tableHeader');
            const body = document.getElementById('tableBody');
            const dates = [];
            let temp = new Date();
            
            while(dates.length < 5) {
                if(temp.getDay() !== 0 && temp.getDay() !== 6) dates.push(new Date(temp));
                temp.setDate(temp.getDate() + 1);
            }

            header.innerHTML = '<th class="p-5 sticky-col text-left font-bold text-gray-400">คณะผู้บริหาร</th>';
            dates.forEach((d, idx) => {
                header.innerHTML += `
                    <th class="p-5 min-w-[120px] ${idx === 0 ? 'today-highlight' : ''}">
                        <div class="text-[10px] opacity-60">${d.toLocaleDateString('th-TH', {weekday:'short'})}</div>
                        <div class="text-base font-bold text-gray-800">${d.getDate()} ${d.toLocaleDateString('th-TH', {month:'short'})}</div>
                    </th>`;
            });

            body.innerHTML = '';
            rawStatus.forEach(person => {
                let row = `<tr class="bg-white"><td class="p-5 sticky-col border-b border-gray-50">
                    <div class="font-bold text-gray-900">${person.Name}</div>
                    <div class="text-[10px] font-bold text-blue-500 uppercase tracking-tighter">${person.Role}</div>
                </td>`;
                
                dates.forEach((date, idx) => {
                    const target = normalizeDate(date);
                    const schedule = rawSchedule.find(s => target >= normalizeDate(s.StartDate) && target <= normalizeDate(s.EndDate) && s.Name.trim() === person.Name.trim());
                    const isDirAbsent = rawSchedule.some(s => target >= normalizeDate(s.StartDate) && target <= normalizeDate(s.EndDate) && s.Name.includes('ฑิราณี'));

                    let content = '<div class="text-2xl">✅</div>';

                    if(schedule) {
                        content = `<div class="text-2xl">❌</div><div class="text-[9px] font-bold text-red-500 mt-1">${schedule.Reason}</div>`;
                    } else if(person.Name.includes('ทนงศักดิ์') && isDirAbsent) {
                        content = `<div class="text-2xl">👑</div><div class="text-[9px] font-bold text-indigo-600 mt-1 leading-none">รักษาราชการแทน</div>`;
                    }
                    
                    row += `<td class="p-5 text-center border-b border-gray-50 ${idx === 0 ? 'today-highlight' : ''}">${content}</td>`;
                });
                body.innerHTML += row + '</tr>';
            });
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const monthYear = document.getElementById('calMonthYear');
            grid.innerHTML = '';
            const y = viewDate.getFullYear();
            const m = viewDate.getMonth();
            monthYear.innerText = new Intl.DateTimeFormat('th-TH', {month:'long', year:'numeric'}).format(viewDate);
            
            ["อา","จ","อ","พ","พฤ","ศ","ส"].forEach(d => grid.innerHTML += `<div class="text-center font-bold text-gray-300 text-[10px] py-2 uppercase tracking-widest">${d}</div>`);
            
            const first = new Date(y, m, 1).getDay();
            const days = new Date(y, m + 1, 0).getDate();
            
            for(let i=0; i<first; i++) grid.innerHTML += '<div></div>';
            
            for(let d=1; d<=days; d++) {
                const current = normalizeDate(`${y}-${m+1}-${d}`);
                const isToday = current === normalizeDate(new Date());
                
                let peopleList = rawStatus.map(p => {
                    const absent = rawSchedule.some(s => current >= normalizeDate(s.StartDate) && current <= normalizeDate(s.EndDate) && s.Name.trim() === p.Name.trim());
                    const shortName = p.Name.split(' ')[1] || p.Name;
                    return `<div class="flex justify-between items-center text-[8px] mb-0.5 ${absent ? 'opacity-30' : 'font-bold text-gray-700'}">
                        <span>${shortName}</span>
                        <span>${absent ? '❌' : '✅'}</span>
                    </div>`;
                }).join('');

                grid.innerHTML += `
                    <div class="min-h-[90px] bg-gray-50/50 border border-gray-100 rounded-xl p-1.5 flex flex-col ${isToday ? 'ring-1 ring-blue-500 bg-blue-50/30' : ''}">
                        <div class="text-[10px] font-bold mb-1 ${isToday ? 'text-blue-500' : 'text-gray-300'}">${d}</div>
                        <div class="flex-1">${peopleList}</div>
                    </div>`;
            }
        }

        function changeMonth(s) { viewDate.setMonth(viewDate.getMonth() + s); renderCalendar(); }
        
        function populateAdminSelect() {
            document.getElementById('adminNameSelect').innerHTML = rawStatus.map(p => `<option value="${p.Name}">${p.Name}</option>`).join('');
        }

        async function submitAbsence() {
            const btn = document.getElementById('submitBtn');
            const data = {
                action: 'addAbsence',
                name: document.getElementById('adminNameSelect').value,
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                reason: document.getElementById('reason').value
            };

            if(!data.startDate || !data.endDate || !data.reason) return Swal.fire('ข้อมูลไม่ครบ', 'กรุณาระบุวันที่และเหตุผล', 'warning');

            btn.disabled = true;
            btn.innerHTML = 'กำลังบันทึก...';

            try {
                await fetch(API_URL, { method:'POST', body: JSON.stringify(data) });
                Swal.fire({ title: 'สำเร็จ', text: 'บันทึกข้อมูลแล้ว', icon: 'success', confirmButtonColor: '#007AFF' });
                document.getElementById('startDate').value = '';
                document.getElementById('endDate').value = '';
                document.getElementById('reason').value = '';
                await loadAllData();
                showTab('home');
            } catch (e) {
                Swal.fire('Error', 'บันทึกไม่สำเร็จ', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'บันทึกข้อมูล';
            }
        }

        loadAllData();
    </script>
</body>
</html>
