<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตารางการปฏิบัติงาน ผู้บริหาร โครงการวมว.มน. - SCiUS NU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Sarabun", sans-serif; 
            background-color: var(--ios-bg); 
            color: #000;
            overflow-x: hidden;
        }
        /* iOS Glassmorphism Navigation */
        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
        }
        .tab-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 12px;
        }
        .tab-active {
            background-color: white;
            color: var(--ios-blue) !important;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .ios-card {
            background: var(--ios-card);
            border-radius: 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        }
        /* No-Scroll Table Styles */
        .table-fixed-layout {
            table-layout: fixed;
            width: 100%;
        }
        .cell-condensed {
            padding: 8px 2px !important;
            word-wrap: break-word;
        }
        .today-highlight {
            background-color: rgba(0, 122, 255, 0.05) !important;
        }
        /* Click Interaction */
        .clickable-symbol {
            cursor: pointer;
            transition: transform 0.1s;
            display: inline-block;
        }
        .clickable-symbol:active {
            transform: scale(0.8);
        }
        /* Custom SwAl Animation */
        .swal2-popup {
            border-radius: 28px !important;
            font-family: 'Sarabun', sans-serif !important;
        }
    </style>
</head>
<body class="pb-10">

    <header class="glass-nav sticky top-0 z-50 border-b border-gray-200/50">
        <div class="max-w-4xl mx-auto px-4 flex justify-between items-center h-20">
            <div class="flex flex-col">
                <span class="text-[9px] font-black text-gray-400 uppercase tracking-[0.2em] leading-none">Executive</span>
                <h1 class="text-xl font-extrabold text-black tracking-tight">คณะผู้บริหาร</h1>
            </div>
            <div class="flex bg-gray-200/50 p-1 rounded-2xl">
                <button id="btn-home" onclick="showTab('home')" class="tab-btn px-4 py-2 text-xs font-bold text-gray-500 tab-active">สถานะ</button>
                <button id="btn-calendar" onclick="showTab('calendar')" class="tab-btn px-4 py-2 text-xs font-bold text-gray-500">ปฏิทิน</button>
                <button id="btn-admin" onclick="showTab('admin')" class="tab-btn px-4 py-2 text-xs font-bold text-gray-500">จัดการ</button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-3 mt-6">
        
        <div id="tab-home" class="tab-content transition-opacity duration-300">
            <div class="flex items-end justify-between mb-4 px-2">
                <h2 class="text-xl font-extrabold tracking-tight text-black">แผนปฏิบัติงาน 5 วัน</h2>
                <button onclick="loadAllData()" class="text-blue-500 font-bold text-xs bg-white px-3 py-1.5 rounded-full shadow-sm">รีเฟรช</button>
            </div>
            
            <div class="ios-card overflow-hidden">
                <table class="table-fixed-layout text-center">
                    <thead>
                        <tr id="tableHeader" class="bg-gray-50/50 text-[9px] font-black text-gray-400 uppercase tracking-tighter border-b border-gray-100"></tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-gray-50"></tbody>
                </table>
            </div>
            <p class="mt-4 text-[10px] text-gray-400 text-center font-medium">แตะที่เครื่องหมาย <span class="text-red-500">❌</span> เพื่อดูรายละเอียด</p>
        </div>

        <div id="tab-calendar" class="tab-content hidden">
            <div class="ios-card p-4">
                <div class="flex justify-between items-center mb-6 px-1">
                    <button onclick="changeMonth(-1)" class="text-blue-500 font-black text-lg bg-gray-100 w-9 h-9 rounded-full flex items-center justify-center">‹</button>
                    <h2 id="calMonthYear" class="text-base font-extrabold text-black"></h2>
                    <button onclick="changeMonth(1)" class="text-blue-500 font-black text-lg bg-gray-100 w-9 h-9 rounded-full flex items-center justify-center">›</button>
                </div>
                <div class="grid grid-cols-7 gap-1.5" id="calendarGrid"></div>
            </div>
        </div>

        <div id="tab-admin" class="tab-content hidden">
            <div class="max-w-sm mx-auto ios-card p-6">
                <div class="mb-6">
                    <h2 class="text-xl font-extrabold text-black tracking-tight">ลงข้อมูลล่วงหน้า</h2>
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Management Schedule</p>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-black text-gray-400 uppercase ml-1">ผู้บริหาร</label>
                        <select id="adminNameSelect" class="w-full mt-1 p-3 bg-gray-100/50 rounded-xl border-none font-bold text-sm"></select>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[10px] font-black text-gray-400 uppercase ml-1">จากวันที่</label>
                            <input type="date" id="startDate" class="w-full mt-1 p-3 bg-gray-100/50 rounded-xl border-none text-xs font-bold">
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-gray-400 uppercase ml-1">ถึงวันที่</label>
                            <input type="date" id="endDate" class="w-full mt-1 p-3 bg-gray-100/50 rounded-xl border-none text-xs font-bold">
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-gray-400 uppercase ml-1">รายละเอียด (ไปไหน/ลาอะไร)</label>
                        <input type="text" id="reason" placeholder="เช่น ไปราชการ กทม." class="w-full mt-1 p-3 bg-gray-100/50 rounded-xl border-none text-sm font-bold">
                    </div>
                    <button id="submitBtn" onclick="submitAbsence()" class="w-full bg-[#007AFF] hover:bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-500/20 transition-all active:scale-95 text-sm mt-2">
                        บันทึกข้อมูล
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="loader" class="fixed inset-0 bg-white/70 backdrop-blur-xl z-[100] flex items-center justify-center hidden">
        <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzxT63E3SeiMZoWeK_KbVD1Ci8DHp6L_VzRFsE9tcF3cvB1d2VsoVr2hPj9tq3Azt4dgg/exec';

        let rawStatus = [];
        let rawSchedule = [];
        let viewDate = new Date(2026, 2, 30); // ตั้งค่าเริ่มต้นที่ 30 มีนาคม 2569

        async function loadAllData() {
            document.getElementById('loader').classList.remove('hidden');
            try {
                const [res1, res2] = await Promise.all([
                    fetch(`${API_URL}?sheet=Status`, { redirect: 'follow' }),
                    fetch(`${API_URL}?sheet=Schedule`, { redirect: 'follow' })
                ]);
                rawStatus = await res1.json();
                rawSchedule = await res2.json();
                renderHome();
                renderCalendar();
                populateAdminSelect();
            } catch (e) {
                Swal.fire('Error', 'ไม่สามารถดึงข้อมูลได้', 'error');
            } finally {
                document.getElementById('loader').classList.add('hidden');
            }
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById(`tab-${id}`).classList.remove('hidden');
            document.getElementById(`btn-${id}`).classList.add('tab-active');
        }

        function normalizeDate(d) {
            if(!d) return null;
            const date = new Date(d);
            date.setHours(0,0,0,0);
            return date.getTime();
        }

        // ฟังก์ชัน Modal สไตล์ iOS
        function showDetail(name, reason, start, end) {
            const startDate = new Date(start).toLocaleDateString('th-TH', { day:'numeric', month:'short' });
            const endDate = new Date(end).toLocaleDateString('th-TH', { day:'numeric', month:'short' });
            
            Swal.fire({
                title: `<p class="text-sm font-black text-gray-400 uppercase tracking-widest mb-1">รายละเอียดการลา</p><p class="text-lg font-extrabold text-black">${name}</p>`,
                html: `
                    <div class="text-center py-2">
                        <p class="text-base font-bold text-red-500 mb-2">"${reason}"</p>
                        <p class="text-xs font-bold text-gray-400">ช่วงวันที่: ${startDate} - ${endDate}</p>
                    </div>
                `,
                confirmButtonText: 'รับทราบ',
                confirmButtonColor: '#007AFF',
                buttonsStyling: true,
                showClass: { popup: 'animate__animated animate__fadeInUp animate__faster' }
            });
        }

        function renderHome() {
            const header = document.getElementById('tableHeader');
            const body = document.getElementById('tableBody');
            const dates = [];
            
            let startLimit = new Date(2026, 2, 30);
            let today = new Date();
            let temp = (today > startLimit) ? today : new Date(startLimit);

            while(dates.length < 5) {
                if(temp.getDay() !== 0 && temp.getDay() !== 6) dates.push(new Date(temp));
                temp.setDate(temp.getDate() + 1);
            }

            // ชื่อคณะผู้บริหารคอลัมน์แรก 25%, วันที่ 5 คอลัมน์ละ 15%
            header.innerHTML = '<th class="w-[25%] p-3 text-left font-black text-gray-300">รายชื่อ</th>';
            dates.forEach((d, idx) => {
                header.innerHTML += `
                    <th class="w-[15%] cell-condensed ${idx === 0 ? 'today-highlight' : ''}">
                        <div class="opacity-50">${d.toLocaleDateString('th-TH', {weekday:'short'})}</div>
                        <div class="text-xs font-black text-gray-800">${d.getDate()}</div>
                    </th>`;
            });

            body.innerHTML = '';
            rawStatus.forEach(person => {
                let row = `<tr class="bg-white"><td class="p-3 text-left border-b border-gray-50">
                    <div class="text-[11px] font-bold text-black leading-tight">${person.Name.split(' ')[0]}</div>
                    <div class="text-[8px] font-black text-blue-500 uppercase">${person.Role.split(' ')[0]}</div>
                </td>`;
                
                dates.forEach((date, idx) => {
                    const target = normalizeDate(date);
                    const schedule = rawSchedule.find(s => target >= normalizeDate(s.StartDate) && target <= normalizeDate(s.EndDate) && s.Name.trim() === person.Name.trim());
                    const isDirAbsent = rawSchedule.some(s => target >= normalizeDate(s.StartDate) && target <= normalizeDate(s.EndDate) && s.Name.includes('ฑิราณี'));

                    let content = '<div class="text-lg opacity-10">✅</div>';

                    if(schedule) {
                        content = `<div onclick="showDetail('${person.Name}', '${schedule.Reason}', '${schedule.StartDate}', '${schedule.EndDate}')" class="clickable-symbol text-lg">❌</div>`;
                    } else if(person.Name.includes('ทนงศักดิ์') && isDirAbsent) {
                        content = `<div class="flex flex-col items-center">
                            <span class="text-lg">👑</span>
                            <span class="text-[6px] font-black text-blue-600 leading-none">รักษาราชการแทน ผอ.</span>
                        </div>`;
                    }
                    
                    row += `<td class="cell-condensed border-b border-gray-50 ${idx === 0 ? 'today-highlight' : ''}">${content}</td>`;
                });
                body.innerHTML += row + '</tr>';
            });
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const monthYear = document.getElementById('calMonthYear');
            grid.innerHTML = '';
            const y = viewDate.getFullYear();
            const m = viewDate.getMonth();
            monthYear.innerText = new Intl.DateTimeFormat('th-TH', {month:'long', year:'numeric'}).format(viewDate);
            
            const startLimit = new Date(2026, 2, 30);

            ["อา","จ","อ","พ","พฤ","ศ","ส"].forEach(d => grid.innerHTML += `<div class="text-center font-black text-gray-300 text-[8px] py-1 uppercase">${d}</div>`);
            
            const first = new Date(y, m, 1).getDay();
            const days = new Date(y, m + 1, 0).getDate();
            
            for(let i=0; i<first; i++) grid.innerHTML += '<div></div>';
            
            for(let d=1; d<=days; d++) {
                const currentObj = new Date(y, m, d);
                const current = normalizeDate(currentObj);
                const isToday = current === normalizeDate(new Date());
                
                // เช็คว่าถึงวันที่ 30 มีนาคม 2569 หรือยัง
                const isStarted = current >= normalizeDate(startLimit);

                let peopleList = '';
                if(isStarted) {
                    peopleList = rawStatus.map(p => {
                        const sched = rawSchedule.find(s => current >= normalizeDate(s.StartDate) && current <= normalizeDate(s.EndDate) && s.Name.trim() === p.Name.trim());
                        const nick = p.Name.split(' ')[1] || p.Name.split(' ')[0];
                        return `<div onclick="${sched ? `showDetail('${p.Name}', '${sched.Reason}', '${sched.StartDate}', '${sched.EndDate}')` : ''}" class="flex justify-between items-center text-[7px] mb-0.5 ${sched ? 'text-red-500 font-bold clickable-symbol' : 'font-bold text-gray-500'}">
                            <span>${nick}</span>
                            <span>${sched ? '❌' : '✅'}</span>
                        </div>`;
                    }).join('');
                }

                grid.innerHTML += `
                    <div class="min-h-[75px] bg-white border border-gray-100 rounded-xl p-1 flex flex-col ${isToday ? 'ring-1 ring-blue-500' : ''}">
                        <div class="text-[9px] font-black mb-1 ${isToday ? 'text-blue-500' : 'text-gray-200'}">${d}</div>
                        <div class="flex-1">${peopleList}</div>
                    </div>`;
            }
        }

        function changeMonth(s) { viewDate.setMonth(viewDate.getMonth() + s); renderCalendar(); }
        function populateAdminSelect() {
            document.getElementById('adminNameSelect').innerHTML = rawStatus.map(p => `<option value="${p.Name}">${p.Name}</option>`).join('');
        }

        async function submitAbsence() {
            const btn = document.getElementById('submitBtn');
            const data = { action: 'addAbsence', name: document.getElementById('adminNameSelect').value, startDate: document.getElementById('startDate').value, endDate: document.getElementById('endDate').value, reason: document.getElementById('reason').value };
            if(!data.startDate || !data.endDate || !data.reason) return Swal.fire('Error', 'กรุณากรอกข้อมูลให้ครบ', 'warning');
            btn.disabled = true; btn.innerHTML = 'กำลังบันทึก...';
            try {
                await fetch(API_URL, { method:'POST', body: JSON.stringify(data) });
                Swal.fire({ title: 'สำเร็จ', icon: 'success', confirmButtonColor: '#007AFF' });
                document.getElementById('startDate').value = ''; document.getElementById('endDate').value = ''; document.getElementById('reason').value = '';
                await loadAllData();
                showTab('home');
            } catch (e) { Swal.fire('Error', 'ไม่สามารถบันทึกได้', 'error'); }
            finally { btn.disabled = false; btn.innerHTML = 'บันทึกข้อมูล'; }
        }

        loadAllData();
    </script>
</body>
</html>
