<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ปฏิทินปฏิบัติงาน โครงการ วมว. มน.</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #f37021;
            --secondary-color: #0056b3;
            --bg-color: #f8f9fa;
        }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .header h2 { margin: 0; color: var(--secondary-color); }
        .controls button { padding: 8px 16px; background: white; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; font-family: 'Sarabun', sans-serif; }
        .controls button:hover { background: #f0f0f0; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day-name { text-align: center; font-weight: 600; padding: 10px 0; background: var(--secondary-color); color: white; border-radius: 6px; }
        .day-cell { min-height: 120px; background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; padding: 8px; display: flex; flex-direction: column; transition: all 0.2s; }
        .day-cell:hover { box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-color: #ccc; }
        .day-number { font-weight: bold; text-align: right; margin-bottom: 8px; color: #555; font-size: 1.1em; }
        .empty-cell { background: transparent; border: none; }
        
        .event { font-size: 0.8em; padding: 6px 8px; border-radius: 4px; margin-bottom: 5px; line-height: 1.4; cursor: pointer; }
        .event-absent { background: #ffebee; color: #c62828; border-left: 3px solid #d32f2f; }
        .event-acting { background: #f3e5f5; color: #4a148c; border-left: 3px solid #7b1fa2; font-weight: 600; }
        .event-meeting { background: #fff8e1; color: #f57f17; border-left: 3px solid #ffb300; }
        .event-work { background: #e0f7fa; color: #006064; border-left: 3px solid #00bcd4; }
        
        .position-text { font-size: 0.85em; opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>ปฏิทินปฏิบัติงาน และผู้รักษาราชการแทน</h2>
        <div class="controls">
            <h3 id="monthYearDisplay" style="display:inline; margin-right: 20px;">กำลังโหลด...</h3>
            <button onclick="changeMonth(-1)">&#8592; เดือนก่อนหน้า</button>
            <button onclick="changeMonth(1)">เดือนถัดไป &#8594;</button>
        </div>
    </div>

    <div class="calendar-grid" id="calendarGrid">
        <div style="grid-column: 1 / -1; text-align: center; padding: 20px;">กำลังโหลดข้อมูลจากฐานข้อมูล...</div>
    </div>
</div>

<script>
    // === นำ URL ของ Web App จาก Google Apps Script มาใส่ที่นี่ ===
    // (อย่าลืมเติม ?sheet=Schedule ต่อท้าย URL ตามที่ออกแบบไว้)
    const API_URL = 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec?sheet=Schedule';
    
    let currentDate = new Date(2026, 3, 1); // เริ่มที่ เมษายน 2026
    let calendarData = []; // ตัวแปรเก็บข้อมูลจาก API

    const monthNamesTH = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
    const dayNamesTH = ["อาทิตย์", "จันทร์", "อังคาร", "พุธ", "พฤหัสฯ", "ศุกร์", "เสาร์"];

    async function fetchCalendarData() {
        try {
            const response = await fetch(API_URL);
            calendarData = await response.json();
            
            // เมื่อโหลดข้อมูลเสร็จ ให้สั่งวาดปฏิทิน
            renderCalendar();
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('calendarGrid').innerHTML = '<div style="grid-column: 1 / -1; text-align: center; color: red; padding: 20px;">เกิดข้อผิดพลาดในการเชื่อมต่อกับฐานข้อมูล</div>';
        }
    }

    function renderCalendar() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        
        document.getElementById('monthYearDisplay').innerText = `${monthNamesTH[month]} ${year + 543}`;
        
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';

        // วาดหัววัน (อาทิตย์ - เสาร์)
        dayNamesTH.forEach(day => {
            const el = document.createElement('div');
            el.className = 'day-name';
            el.innerText = day;
            grid.appendChild(el);
        });

        // กล่องเปล่าก่อนเริ่มวันที่ 1
        for (let i = 0; i < firstDay; i++) {
            const empty = document.createElement('div');
            empty.className = 'day-cell empty-cell';
            grid.appendChild(empty);
        }

        // วาดวันที่
        for (let day = 1; day <= daysInMonth; day++) {
            const cell = document.createElement('div');
            cell.className = 'day-cell';
            
            // สร้างรูปแบบวันที่เป็น YYYY-MM-DD
            const dateString = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            
            let eventsHTML = '';
            // กรองข้อมูลเฉพาะวันที่ตรงกัน
            const dayEvents = calendarData.filter(e => e.date === dateString);
            
            // เรียงให้ ผอ. ไม่อยู่ ขึ้นก่อนเสมอ
            dayEvents.sort((a, b) => {
                if(a.type === 'absent') return -1;
                if(b.type === 'absent') return 1;
                return 0;
            });
            
            dayEvents.forEach(event => {
                let eventClass = 'event-work';
                if(event.type === 'absent') eventClass = 'event-absent';
                if(event.type === 'acting') eventClass = 'event-acting';
                if(event.type === 'meeting') eventClass = 'event-meeting';
                
                // ตรวจสอบว่ามีการใส่ Position มาหรือไม่
                const positionDisplay = event.Position ? `<span class="position-text">(${event.Position})</span>` : '';
                
                eventsHTML += `
                    <div class="event ${eventClass}" title="${event.name} ${event.Position || ''}: ${event.status}">
                        <strong>${event.name}</strong> ${positionDisplay}<br>
                        ${event.status}
                    </div>
                `;
            });

            cell.innerHTML = `
                <div class="day-number">${day}</div>
                ${eventsHTML}
            `;
            grid.appendChild(cell);
        }
    }

    function changeMonth(step) {
        currentDate.setMonth(currentDate.getMonth() + step);
        renderCalendar();
    }

    // เรียกฟังก์ชันดึงข้อมูลเมื่อโหลดหน้าเว็บ
    fetchCalendarData();
</script>

</body>
</html>
